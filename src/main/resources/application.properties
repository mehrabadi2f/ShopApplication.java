server.port=8081

spring.servlet.multipart.enabled=true

# File upload directory
file.upload-dir=uploads

# Multipart limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html


# ===============================
# Oracle Database Configuration
# ===============================

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=shop_user
spring.datasource.password=shop_pass
 
# ===============================
# JPA / Hibernate Configuration
# ===============================

# ???? ???? ??? ???? ??????? Oracle ?????? update ??????? ???
# ??? ???? ????? ???/Enterprise ???? ??? ????? validate + Flyway ??????? ???
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Oracle Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

spring.jpa.properties.hibernate.generate_statistics=false

# Batch insert/update
spring.jpa.properties.hibernate.jdbc.batch_size=2000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ???? ???? batch ?? Hibernate
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===============================
# Logging
# ===============================

logging.file.name=app.log

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.web=DEBUG

# ???? ???? SQL bind parameters ?? Hibernate 6
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# Redis Configuration
# ===============================

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms
